<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하우스텐보스행 초대장</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --navy: #1a1f2e;
    --navy-deep: #0f1420;
    --orange: #d45f1e;
    --orange-deep: #b84e15;
    --cream: #fdfbf7;
    --text-cream: #f0e8d8;
    --text-muted: #8a9ab5;
    --gold: #c9a84c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; min-height: 100vh;
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--navy-deep);
    color: var(--text-cream);
    overflow-x: hidden;
  }

  .bg-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(212,95,30,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(26,31,46,0.8) 0%, transparent 60%),
      var(--navy-deep);
  }

  .step {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }

  .orange-line {
    width: 50px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
    margin: 1.2rem auto;
  }

  /* ═══ STEP 1 — 봉투 + 탑승권 레이어 구조 ═══ */
  .step1-eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 2rem;
    font-weight: 600;
  }

  .envelope-container {
    position: relative;
    width: 320px;
    height: 380px;
    margin: 0 auto 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: flex-end;
    overflow: visible;
  }

  /* [레이어 1] 봉투 뒷면 */
  .envelope-back {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 180px;
    background: #13192b;
    border-radius: 4px 4px 6px 6px;
    z-index: 1;
    box-shadow: inset 0 12px 18px rgba(0,0,0,0.35);
  }

  .envelope-back::before {
    content: '';
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 72px;
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0));
    clip-path: polygon(0 0, 50% 62%, 100% 0);
  }
