<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하우스텐보스행 초대장</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --navy: #1a1f2e;
    --navy-deep: #0f1420;
    --orange: #d45f1e;
    --orange-deep: #b84e15;
    --cream: #fdfbf7;
    --text-cream: #f0e8d8;
    --text-muted: #8a9ab5;
    --gold: #c9a84c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; min-height: 100vh;
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--navy-deep);
    color: var(--text-cream);
    overflow-x: hidden;
  }

  .bg-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(212,95,30,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(26,31,46,0.8) 0%, transparent 60%),
      var(--navy-deep);
  }

  .step {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }

  .orange-line {
    width: 50px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
    margin: 1.2rem auto;
  }

  /* ═══ STEP 1 (입체 샌드위치 봉투 구조 구현) ═══ */
  .step1-eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; letter-spacing: 0.35em;
    color: var(--orange); text-transform: uppercase;
    margin-bottom: 2rem; font-weight: 600;
  }

  /* 메인 컨테이너 */
  .envelope-container {
    position: relative;
    width: 320px;
    height: 380px;
    margin: 0 auto 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: flex-end;
  }

  /* [레이어 1] 봉투 뒷면 (가장 아래) */
  .envelope-back {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 180px;
    background: #13192b; /* 내부가 어둡게 보이도록 설정 */
    border-radius: 4px;
    z-index: 1;
  }

  /* [레이어 2] 편지지 카드 (중간 샌드위치) */
  .ticket-card-peek {
    position: absolute;
    bottom: 20px; /* 초기에는 봉투 안에 살짝 잠겨있음 */
    left: 50%;
    transform: translateX(-50%);
    width: 270px;
    background: #f7f3eb;
    border-radius: 4px;
    padding: 24px 20px 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    z-index: 2; /* 뒷면보단 위, 앞면보단 아래 */
    border: 1px solid rgba(200,180,140,0.3);
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), bottom 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    animation: initBounce 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  /* 첫 진입 시 살짝 올라오는 효과 */
  @keyframes initBounce {
    0%   { bottom: -40px; opacity: 0; }
    70%  { bottom: 35px; opacity: 1; }
    85%  { bottom: 15px; }
    100% { bottom: 20px; }
  }

  /* ★핵심 마우스 호버 모션: 앞봉투에 가려진 채로 위로 쑥! 솟아오름 */
  .envelope-container:hover .ticket-card-peek {
    bottom: 110px; /* 봉투 위로 확 올라오도록 서서히 위치 변경 */
    transform: translateX(-50%) scale(1.02);
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
  }

  .peek-invite-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px; letter-spacing: 0.22em;
    color: #b09060; margin-bottom: 8px;
    text-transform: uppercase; text-align: center;
  }
  .peek-label {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 700;
    color: #2a1f10; letter-spacing: 0.02em;
    line-height: 1.2; margin-bottom: 6px; text-align: center;
  }
  .peek-label span { font-style: italic; color: var(--orange); }
  .peek-sub { font-size: 10px; color: #777; letter-spacing: 0.04em; margin-bottom: 12px; text-align: center; }
  .peek-divider { border: none; border-top: 1px solid #e2dacb; margin: 12px 0; }
  .peek-route {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; font-weight: 700; color: #444; letter-spacing: 0.05em; padding: 0 5px;
  }
  .peek-route-arrow { color: var(--orange); font-size: 12px; }

  /* 골드 라운드 왁스씰 */
  .peek-wax {
    position: absolute;
    bottom: -15px; right: 15px;
    width: 46px; height: 46px; z-index: 5;
    background: radial-gradient(circle at 35% 35%, #dfba6b, #b89341);
    border-radius: 50%;
    box-shadow: 2px 3px 8px rgba(0,0,0,0.3), inset -2px -2px 5px rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: center;
    border: 1px solid #c9a84c;
  }
  .peek-wax::after {
    content: 'HTB';
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px; font-weight: 700; color: #fff; opacity: 0.85;
  }

  /* [레이어 3] 겉봉투 앞면 (편지지를 덮어 가려주는 역할) */
  .envelope-front {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 180px;
    z-index: 3; /* 편지지(z-index: 2)보다 위에 배치 */
    pointer-events: none; /* 마우스 호버 이벤트를 컨테이너가 먹을 수 있도록 패스 */
    overflow: hidden;
  }
  /* 입체감을 위한 앞면 덮개 날개 모양 (삼각형 구조 연출) */
  .envelope-front-visual {
    position: absolute; inset: 0;
    background: #192038;
    border-radius: 0 0 4px 4px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.4);
  }
  .envelope-front-visual::before {
    content: ''; position: absolute; top: 0; left: 0; width: 0; height: 0;
    border-left: 160px solid transparent;
    border-right: 160px solid transparent;
    border-top: 95px solid rgba(15, 20, 32, 0.85); /* 뚫린 공간 쉐도우 */
  }
  .envelope-front-visual::after {
    content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 0;
    border-left: 160px solid #202846;
    border-right: 160px solid #202846;
    border-top: 95px solid transparent; /* 하
